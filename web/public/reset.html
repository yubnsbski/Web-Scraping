<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvestAssist Reset</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: #070b12;
        color: #e5edf8;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }

      main {
        width: min(640px, 100%);
        padding: 24px;
        border: 1px solid #26364f;
        border-radius: 12px;
        background: #101827;
        box-shadow: 0 24px 70px rgb(0 0 0 / 32%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        line-height: 1.7;
        color: #8ea1bd;
      }

      a,
      button {
        min-height: 44px;
        padding: 10px 16px;
        border: 0;
        border-radius: 8px;
        color: #07111f;
        background: #38bdf8;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 18px;
      }

      code {
        color: #e5edf8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>表示キャッシュをリセットしています</h1>
      <p id="status">Service Worker と古いキャッシュを確認しています。</p>
      <div class="actions">
        <a href="/">アプリを開く</a>
        <button type="button" id="retry">もう一度リセット</button>
      </div>
    </main>
    <script>
      async function reset() {
        const status = document.getElementById("status");
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          status.textContent = "リセットしました。自動でアプリを開きます。";
          setTimeout(() => {
            window.location.replace("/?reset=" + Date.now());
          }, 800);
        } catch (error) {
          status.textContent =
            "自動リセットに失敗しました。ブラウザのサイトデータ削除後に " +
            "http://127.0.0.1:5173/ を開いてください。";
          console.error(error);
        }
      }

      document.getElementById("retry").addEventListener("click", reset);
      void reset();
    </script>
  </body>
</html>
