gemini:
  enabled: true
  # 解答精度を優先する場合は、無料枠で利用できる新しめのモデルに更新します。
  # 環境で利用可能なモデル名に合わせて変更してください（実API利用は手動承認が前提）。
  model: gemini-2.5-flash
  # gemini-2.0-flash lost its free tier (429 limit:0 observed 2026-07-09).
  # gemini-3.5-flash works on the free tier but 503s under load ~50% of the
  # time (observed same day) and the LLM service has no retry — every 503
  # becomes a fallback answer. gemini-2.5-flash was stable; revisit 3.5 once
  # a retry lands in llm/service.py.
  # The request limits below are in-house ceilings; Google's server-side
  # quota is the real bound and a 429 falls back per `fallback:` below.
  # warning/hard-stop ratios below yield an effective ~1200/1425 daily cutoff.
  daily_request_limit: 1500
  monthly_request_limit: 45000
  warning_threshold_ratio: 0.8
  hard_stop_threshold_ratio: 0.95
  usage_db_path: data/runtime/gemini_usage.sqlite
  cache:
    enabled: true
    ttl_days: 30
    db_path: data/runtime/llm_cache.sqlite
  fallback:
    on_daily_limit: local_summary
    on_monthly_limit: skip_llm
    on_error: local_summary
  allowed_tasks:
    - rag_answer
    - important_report_summary
    - multimodal_chart_extraction
    - web_answer
  blocked_tasks:
    - bulk_news_summary
    - repeated_translation
    - low_priority_sentiment
