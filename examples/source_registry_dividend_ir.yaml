# Dividend-focused IR crawl run set (qualitative text → RAG store).
#
# Companion to source_registry_dividend_edinet.yaml: EDINET gives the numbers,
# these IR crawls give the words (配当方針 / 株主還元 / 中期経営計画). The crawler is
# locked to allowed_domains + url_prefix, follows robots.txt, and stops at
# max_depth / max_pages — so a stale URL is harmless (it simply yields no pages).
#
# IMPORTANT: verify each `url` / `url_prefix` against the company's current IR
# site before a live run; corporate IR paths change over time.
#
# Run:
#   investment-assistant crawl \
#     --path examples/source_registry_dividend_ir.yaml \
#     --output-dir local_docs/crawl
#   # (auto-indexes into the RAG store unless --no-index)
sources:
  - name: "8306_MUFG_ir_crawl"
    ticker: "8306"
    company: "三菱UFJフィナンシャル・グループ"
    source_type: "issuer_ir"
    method: "crawl"
    allowed: true
    url: "https://www.mufg.jp/ir/"
    allowed_domains: "www.mufg.jp"
    url_prefix: "https://www.mufg.jp/ir/"
    crawl_mode: "targeted"
    max_depth: 2
    max_pages: 20

