# IR site crawl targets (Phase 3, targeted mode).
#
# Same safety boundary as the rest of the registry: source_type=issuer_ir and
# allowed=true only. method=crawl marks an entry for the guided crawler (vs
# method=html for a single fetch-job page). The crawler is locked to
# allowed_domains and url_prefix, follows robots.txt, and stops at max_depth /
# max_pages. It descends from the IR top page toward dividend-policy / financial
# body pages (qualitative text), complementing the EDINET numeric path.
sources:
  - name: "8306_MUFG_ir_crawl"
    ticker: "8306"
    company: "MUFG"
    source_type: "issuer_ir"
    method: "crawl"
    allowed: true
    url: "https://www.mufg.jp/ir/"
    allowed_domains: "www.mufg.jp"
    url_prefix: "https://www.mufg.jp/ir/"
    crawl_mode: "targeted"
    max_depth: 2
    max_pages: 20

  - name: "9432_NTT_ir_crawl"
    ticker: "9432"
    company: "NTT"
    source_type: "issuer_ir"
    method: "crawl"
    allowed: true
    url: "https://group.ntt/jp/ir/"
    allowed_domains: "group.ntt"
    url_prefix: "https://group.ntt/jp/ir/"
    crawl_mode: "targeted"
    max_depth: 2
    max_pages: 20
