# Nikkei 225 EDINET (金融庁) targets — representative constituents.
#
# Same safety boundary as the rest of the registry: source_type=public_api,
# provider=edinet, allowed=true. Financial numbers come from official filings
# via the EDINET API (not scraped HTML).
#
# Per-entry fields used by the EDINET connector:
#   doc_types   : comma/space separated EDINET docTypeCode values
#                 (120=有価証券報告書, 140=四半期報告書, 160=半期報告書)
#   max_periods : how many recent filings to keep per ticker (annual + quarterly).
#                 Repeated/weekly runs accumulate history (already-saved filings
#                 are skipped), so set --days wide enough to reach the periods you
#                 want, then let the weekly job fill in over time.
#
# secCode is derived as ticker+"0", so company names here are display-only.
sources:
