# Dividend-focused EDINET run set (official filings → financials.csv).
#
# A curated set of well-known, liquid Japanese dividend payers. EDINET resolves
# each entry by its securities code, so only ticker / company / provider are
# needed — no URLs to verify. Numbers (営業CF / 自己資本比率 / １株配当 / 配当性向)
# come from official 有価証券報告書 (doc_type 120) and 四半期報告書 (140), which is
# what the dividend simulator's financials.csv consumes.
#
# Run (needs a free EDINET v2 Subscription-Key):
#   export EDINET_API_KEY=...        # https://api.edinet-fsa.go.jp (Subscription-Key)
#   investment-assistant edinet-ingest \
#     --registry examples/source_registry_dividend_edinet.yaml \
#     --years 3 --output-dir local_docs/edinet
#
# Output: local_docs/edinet/financials.csv (+ per-filing RAG text), auto-indexed
# into the RAG store unless --no-index is passed.
sources:
  - name: "8306_MUFG_edinet"
    ticker: "8306"
    company: "三菱UFJフィナンシャル・グループ"
    source_type: "public_api"
    provider: "edinet"
    method: "api"
    allowed: true
    doc_types: "120 140"

