<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Minimal Backend UI</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; }
      pre { background:#f6f8fa; padding:1rem; }
    </style>
  </head>
  <body>
    <h1>Minimal Backend UI</h1>
    <p>This page calls the local API endpoints and shows JSON responses.</p>

    <h2>/</h2>
    <pre id="root">loading...</pre>

    <h2>/api/crypto/config</h2>
    <pre id="config">loading...</pre>

    <h2>/api/encrypted-tx</h2>
    <pre id="tx">loading...</pre>

    <script>
      async function load() {
        try {
          const r1 = await fetch('/');
          document.getElementById('root').textContent = JSON.stringify(await r1.json(), null, 2);
        } catch(e) { document.getElementById('root').textContent = String(e); }

        try {
          const r2 = await fetch('/api/crypto/config');
          document.getElementById('config').textContent = JSON.stringify(await r2.json(), null, 2);
        } catch(e) { document.getElementById('config').textContent = String(e); }

        try {
          const r3 = await fetch('/api/encrypted-tx');
          document.getElementById('tx').textContent = JSON.stringify(await r3.json(), null, 2);
        } catch(e) { document.getElementById('tx').textContent = String(e); }
      }
      load();
    </script>
  </body>
</html>
